<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Practice — IntelliPrep</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/coding.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><span class="brand-icon">⚡</span><span class="brand-name">IntelliPrep</span></div>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a href="coding.html" class="active">Practice</a>
    <a href="interview.html">Interview</a>
    <a href="resume.html">Resume</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
  <div class="nav-actions">
    <button class="btn-ghost" onclick="parent.showAuthModal ? parent.showAuthModal('login') : null">Login</button>
    <button class="btn-primary">Get Started</button>
  </div>
</nav>

<div class="coding-layout">

  <!-- SIDEBAR: Problem List -->
  <aside class="problems-sidebar">
    <div class="sidebar-header">
      <h2>Problems</h2>
      <div class="sidebar-filters">
        <select id="diffFilter" onchange="filterProblems()" class="filter-select">
          <option value="all">All Levels</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <select id="topicFilter" onchange="filterProblems()" class="filter-select">
          <option value="all">All Topics</option>
          <option value="Array">Array</option>
          <option value="String">String</option>
          <option value="Tree">Tree</option>
          <option value="Graph">Graph</option>
          <option value="DP">DP</option>
          <option value="Linked List">Linked List</option>
        </select>
      </div>
      <div class="progress-summary">
        <span id="solvedCount">0</span>/50 solved
        <div class="progress-bar-wrap" style="margin-top:6px">
          <div class="progress-bar" id="solvedProgress" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="problem-list" id="problemList"></div>
  </aside>

  <!-- MAIN: Code Editor -->
  <main class="code-area">
    <div class="problem-header" id="problemHeader">
      <div>
        <h2 id="problemTitle">Select a Problem</h2>
        <div id="problemMeta" style="display:flex;gap:0.75rem;margin-top:0.5rem;align-items:center"></div>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn-ghost" onclick="showHint()">💡 Hint</button>
        <button class="btn-ghost" onclick="showSolution()">👁 Solution</button>
        <button class="btn-primary" onclick="runCode()">▶ Run Code</button>
      </div>
    </div>

    <div class="problem-desc-panel" id="problemDesc">
      <p style="color:var(--text-muted)">👈 Select a problem from the sidebar to begin.</p>
    </div>

    <div class="editor-wrap">
      <div class="editor-bar">
        <select id="langSelect" class="filter-select" style="font-size:0.82rem">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
        </select>
        <span style="color:var(--text-dim);font-size:0.8rem">Code Editor</span>
      </div>
      <textarea id="codeEditor" class="code-editor" placeholder="# Write your solution here...
# Select a problem from the sidebar to start"></textarea>
    </div>

    <div class="output-panel" id="outputPanel">
      <div class="output-bar">
        <span>Output</span>
        <button onclick="clearOutput()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.8rem">Clear</button>
      </div>
      <div id="outputContent" class="output-content">
        <span style="color:var(--text-dim)">Run your code to see output...</span>
      </div>
    </div>
  </main>
</div>

<script src="../js/main.js"></script>
<script>

let currentProblem = null;
const solvedSet = new Set(JSON.parse(localStorage.getItem('intelliprep_solved') || '[]'));

function renderProblemList() {
  const diff = document.getElementById('diffFilter').value;
  const topic = document.getElementById('topicFilter').value;
  const list = document.getElementById('problemList');

  const filtered = PROBLEMS.filter(p =>
    (diff === 'all' || p.difficulty === diff) &&
    (topic === 'all' || p.topic === topic)
  );

  list.innerHTML = filtered.map(p => `
    <div class="problem-item ${currentProblem?.id === p.id ? 'active' : ''}" onclick="loadProblem(${p.id})">
      <div class="problem-item-info">
        <span class="problem-check">${solvedSet.has(p.id) ? '✅' : '⭕'}</span>
        <span class="problem-name">${p.title}</span>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span class="tag tag-${p.difficulty.toLowerCase()}">${p.difficulty}</span>
        <span class="badge-company">${p.topic}</span>
      </div>
    </div>
  `).join('');

  // Update progress
  document.getElementById('solvedCount').textContent = solvedSet.size;
  document.getElementById('solvedProgress').style.width = `${(solvedSet.size/PROBLEMS.length)*100}%`;
}

function filterProblems() { renderProblemList(); }

function loadProblem(id) {
  currentProblem = PROBLEMS.find(p => p.id === id);
  if (!currentProblem) return;

  document.getElementById('problemTitle').textContent = `${currentProblem.id}. ${currentProblem.title}`;
  document.getElementById('problemMeta').innerHTML = `
    <span class="tag tag-${currentProblem.difficulty.toLowerCase()}">${currentProblem.difficulty}</span>
    <span class="badge-company">${currentProblem.topic}</span>
    ${solvedSet.has(id) ? '<span style="color:var(--success);font-size:0.85rem">✓ Solved</span>' : ''}
  `;
  document.getElementById('problemDesc').innerHTML = `<p>${currentProblem.desc}</p>`;
  document.getElementById('codeEditor').value = currentProblem.starterCode || '';
  document.getElementById('outputContent').innerHTML = '<span style="color:var(--text-dim)">Run your code to see output...</span>';
  renderProblemList();
}

function runCode() {
  if (!currentProblem) { showToast('⚠️ Select a problem first!'); return; }
  const output = document.getElementById('outputContent');
  output.innerHTML = '<span style="color:var(--accent-3)">⏳ Running...</span>';

  setTimeout(() => {
    // Simulate output
    const passed = Math.random() > 0.3;
    if (passed) {
      output.innerHTML = `<span style="color:var(--success)">✅ All test cases passed!</span>
<br><br><code style="color:var(--text-muted);font-size:0.82rem">Runtime: ${Math.floor(Math.random()*50+10)}ms | Memory: ${Math.floor(Math.random()*5+2)}MB</code>`;
      solvedSet.add(currentProblem.id);
      localStorage.setItem('intelliprep_solved', JSON.stringify([...solvedSet]));
      renderProblemList();
      // Update stats
      const stats = JSON.parse(localStorage.getItem('intelliprep_stats') || '{}');
      stats.solved = solvedSet.size;
      localStorage.setItem('intelliprep_stats', JSON.stringify(stats));
    } else {
      output.innerHTML = `<span style="color:var(--danger)">❌ Wrong Answer</span>
<br><br><code style="color:var(--text-muted);font-size:0.82rem">Expected: [0,1]<br>Got: None</code>
<br><br><span style="color:var(--text-dim)">Hint: Check your logic and edge cases.</span>`;
    }
  }, 1000);
}

function showHint() {
  if (!currentProblem) { showToast('⚠️ Select a problem first!'); return; }
  const output = document.getElementById('outputContent');
  output.innerHTML = `<span style="color:var(--accent-3)">💡 Hint:</span><br><br>${currentProblem.hint}`;
}

function showSolution() {
  if (!currentProblem) { showToast('⚠️ Select a problem first!'); return; }
  const output = document.getElementById('outputContent');
  output.innerHTML = `<span style="color:var(--accent-2)">👁 Solution:</span><br><br><pre style="color:var(--accent);font-size:0.82rem;line-height:1.6">${currentProblem.solution}</pre>`;
}

function clearOutput() {
  document.getElementById('outputContent').innerHTML = '<span style="color:var(--text-dim)">Run your code to see output...</span>';
}

// Init
renderProblemList();
loadProblem(1);

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
